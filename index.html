<!DOCTYPE html>
<html lang="ko">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

  .api-key-section {

  .api-key-row {

  .api-key-row input { flex: 1; }
  .key-btn {

  .key-btn:hover { background: rgba(255,255,255,0.14); }
  .key-btn-danger:hover { background: rgba(255,80,80,0.2); border-color: rgba(255,80,80,0.4); }

  .key-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;

  .checkbox-label {
    display: flex;

  .analyze-btn {

  .loading { text-align: center; padding: 30px; color: #a0a0c0; }
  .loading-hint {

  .result {
    background: rgba(255,255,255,0.04);

  .recommendations { display: grid; gap: 12px; }

    color: #6c8dff;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .rec-card.contrast .rec-type { color: #ff9b6c; }
  .rec-card.deeper .rec-type { color: #6cffaa; }
  .rec-title { font-weight: 600; margin-bottom: 4px; font-size: 15px; }
  .rec-reason { font-size: 13px; color: #b0b0c8; }

  /* 참조 자료 카드 */
  .resources { display: grid; gap: 10px; margin-top: 12px; }
  .resource-card {
    background: rgba(0,0,0,0.2);
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.05);

    gap: 12px;

  .resource-card.trusted {

  .resource-icon {
    font-size: 20px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }
  .resource-body { flex: 1; min-width: 0; }
  .resource-header {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .resource-type {
    font-size: 10px;
    color: #6c8dff;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .trust-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 8px;
    background: rgba(108, 255, 170, 0.15);
    color: #6cffaa;
    border: 1px solid rgba(108, 255, 170, 0.3);
    font-weight: 500;
  }
  .trust-badge.untrusted {

    color: #a0a0c0;
    border-color: rgba(160, 160, 192, 0.2);
  }
  .resource-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; word-break: break-word; }
  .resource-desc { font-size: 12px; color: #a0a0c0; margin-bottom: 6px; }
  .credibility {
    font-size: 11px;
    color: #6cffaa;
    background: rgba(108, 255, 170, 0.08);
    padding: 3px 8px;
    border-radius: 6px;
    margin-bottom: 6px;
    display: inline-block;
  }
  .resource-link {
    display: inline-block;
    font-size: 12px;
    color: #6c8dff;
    text-decoration: none;
    word-break: break-all;
    margin-top: 4px;
  }
  .resource-link:hover { text-decoration: underline; }

  .grounding-footer {
    margin-top: 12px;
    padding: 10px 12px;
    background: rgba(108, 141, 255, 0.06);
    border-left: 3px solid rgba(108, 141, 255, 0.4);
    border-radius: 6px;
  }
  .grounding-label {
    font-size: 11px;
    color: #a0baff;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .search-suggestions { font-size: 11px; }
  .search-suggestions a {
    color: #6c8dff;
    text-decoration: none;
  }

  .disclaimer {
    font-size: 11px;
    color: #6b6b8a;
    margin-top: 10px;
    padding: 8px 12px;
    background: rgba(255,200,100,0.05);
    border-left: 2px solid rgba(255,200,100,0.3);
    border-radius: 4px;
  }

  .error {
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff9999;
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 14px;
    word-break: break-word;
  }

  .reset-btn {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.08);
    color: #e8e8e8;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.12); }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📚 책 큐레이션 AI</h1>
    <p class="subtitle">서점에서 만난 책 한 권, 깊이 읽기를 위한 안내자</p>
    <div class="badge">Powered by Google Gemini 2.5 Flash</div>
  </header>

  <div class="api-key-section">
    <label>🔑 Google AI Studio API Key</label>
    <div class="api-key-row">
      <input type="password" id="apiKey" placeholder="AIza..." />
      <button type="button" id="toggleKeyVisibility" class="key-btn" title="키 보기/숨기기">👁️</button>
      <button type="button" id="clearKey" class="key-btn key-btn-danger hidden" title="저장된 키 삭제">🗑️</button>
    </div>
    <div class="key-controls">
      <label class="checkbox-label">
        <input type="checkbox" id="rememberKey" />
        <span>이 기기에 키 저장 (개인 기기에서만 사용)</span>
      </label>
      <span id="keyStatus" class="key-status"></span>
    </div>
    <p class="hint">
      무료 발급: <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a> · 카드 등록 불필요 · 일 1,500회 무료
    </p>
  </div>

  <div class="upload-area" id="uploadArea">
    <div class="icon">📷</div>
    <div class="text">책 표지나 서점 매대 사진을 올려주세요</div>
    <div class="hint">클릭 또는 드래그앤드롭 · JPG/PNG/WEBP</div>
    <input type="file" id="fileInput" accept="image/*" />
  </div>

  <div class="preview hidden" id="preview">
    <img id="previewImg" alt="업로드된 이미지" />
  </div>

  <button class="analyze-btn hidden" id="analyzeBtn">✨ 분석 시작</button>

  <div class="loading hidden" id="loading">
    <div class="spinner"></div>
    <div id="loadingStatus">책을 살펴보고 있습니다…</div>
    <div class="loading-hint">서버 혼잡 시 자동으로 재시도합니다 (최대 30초)</div>
  </div>

  <div id="errorBox"></div>
  <div id="resultBox"></div>

  <button class="reset-btn hidden" id="resetBtn">🔄 다른 책 분석하기</button>
</div>

<script>
// ============================================================
// 책 큐레이션 AI v3 - 자동 재시도 + 모델 폴백
// ============================================================

// 모델 폴백 순서: 첫 번째 실패 시 다음 모델로
const MODELS = [
  'gemini-2.5-flash',
  'gemini-2.5-flash-lite',
  'gemini-2.0-flash'
];

// 재시도 가능한 HTTP 상태 코드
const RETRYABLE_STATUS = [429, 500, 502, 503, 504];
const MAX_RETRIES_PER_MODEL = 2;  // 모델당 최대 재시도 횟수

const SYSTEM_PROMPT = `당신은 한국과 세계의 모든 분야 도서에 정통한 서점 큐레이터이자 비평가입니다.
독자가 책 표지나 매대 사진을 보여주면, 그 책을 식별하고 깊이 있는 큐레이션을 제공합니다.

【중요 원칙】

1. **장르 적응**: 책의 장르와 성격에 따라 분석 섹션의 명칭을 달리합니다.
   - 소설/문학 → "문학사적 위치"
   - 철학·사상 → "사상사적 좌표"
   - 경제·경영 → "시장·산업적 맥락"
   - 자기계발 → "동시대 담론에서의 위치"
   - 과학 → "과학사적 의의"
   - 역사 → "역사학적 위치"
   - 사회학 → "사회과학적 맥락"
   - 법·정치 → "제도사적·정책적 맥락"
   - 종교·신학 → "신학적·교회사적 위치"
   - 예술·미학 → "예술사적 좌표"
   - 시 → "시사(詩史)적 위치"
   - 에세이 → "동시대 문화적 맥락"

2. **균형 잡힌 비평**: 호평과 비판을 함께 제시합니다.

3. **추천 도서 3종 구성**:
   - similar (유사): 같은 주제·정서를 더 깊이 탐구한 책
   - contrast (대조): 같은 주제를 반대 입장에서 다룬 책
   - deeper (심화): 이론적·역사적 배경을 이해할 수 있는 책

4. **참조 자료 — Google Search Grounding 적극 활용 (핵심 요구사항)**:

   당신은 google_search 도구를 사용할 수 있습니다. 이 도구를 적극 활용하여 다음을 수행하세요:

   **검색 전략 (우선순위 순서)**:
   1순위 - **학술 자료** (반드시 최소 2개): 다음 검색 쿼리를 직접 실행하세요
      - "[책 제목] [저자] 논문"
      - "[책 제목] [저자] scholar"
      - "[책 제목] 학술 비평"
      - "[저자명] criticism academic"

   2순위 - **YouTube 영상·강연**: 다음 검색 쿼리 실행
      - "[책 제목] [저자] 강연"
      - "[책 제목] 리뷰 youtube"
      - "[저자명] interview lecture"

   3순위 - **언론 기사 (주요 매체)**: 다음 검색 쿼리 실행
      - "[책 제목] [저자] 한겨레 OR 조선일보 OR 중앙일보 OR 경향신문"
      - "[책 제목] review NYT OR Guardian OR New Yorker"

   4순위 - **서평지·블로그**: 채널예스, 라디오북, 알라딘 서재 등

   **신뢰성 평가 기준**:
   - 학술 자료: dbpia.co.kr, kiss.kstudy.com, riss.kr, scholar.google.com, jstor.org, springer.com, .edu, .ac.kr 도메인 우대
   - 언론: 주요 일간지·주간지·전문지 우대 (블로그성 매체 회피)
   - YouTube: 구독자/조회수 많은 채널 (학술 채널, 출판사 공식 채널, 유명 비평가) 우대
   - 출판사 공식·저자 공식 사이트 우대

   **반드시 지킬 것**:
   - 검색 결과에서 찾은 **실제 URL만** 제공하세요. URL을 절대 만들어내지 마세요.
   - 검색 결과가 없거나 신뢰성이 의심되면 그 항목은 빈 배열로 두세요. 가짜 URL을 만들지 마세요.
   - 학술 자료는 반드시 2개 이상 포함하도록 노력하세요 (사용자 우선순위).
   - 영문/한글 자료 모두 검색하세요 (책이 번역서면 원서 비평도 함께).

5. **솔직함**: 식별 불가능하면 그렇게 답하고, 추측은 "추정"임을 명시합니다.

【출력 형식】
JSON 형식만 사용하세요. 단, google_search 도구를 사용해야 하므로 일반 텍스트 응답으로 JSON을 출력하세요 (responseMimeType은 grounding과 함께 사용 불가).

응답은 반드시 다음 형식의 JSON으로만 시작하고 끝나야 하며, JSON 앞뒤에 어떤 설명도 추가하지 마세요. 마크다운 코드블록도 사용하지 마세요:

{
  "identified": true 또는 false,
  "confidence": "high" | "medium" | "low",
  "title": "책 제목 (원어/한국어 병기)",
  "author": "저자명",
  "publisher_year": "출판사, 출판연도",
  "genre": "구체적 장르 분류",
  "context_section_label": "이 책에 맞는 맥락 섹션 명칭",
  "summary": "2-3문장 핵심 소개",
  "context_analysis": "3-4문장 분석",
  "critical_view": "비평적 평가 (3-4문장)",
  "recommendations": [
    { "type": "similar", "title": "...", "author": "...", "reason": "..." },
    { "type": "contrast", "title": "...", "author": "...", "reason": "..." },
    { "type": "deeper", "title": "...", "author": "...", "reason": "..." }
  ],
  "resources": [
    {
      "type": "academic|video|news|blog|social|review",
      "title": "자료의 실제 제목",
      "description": "이 자료의 핵심 가치 (1문장)",
      "url": "검색으로 확인한 실제 URL",
      "source_name": "출처 명칭 (예: DBpia, YouTube - 채널명, 한겨레)",
      "credibility_signal": "신뢰도 근거 (예: '학술 데이터베이스 등재', '주요 일간지', '구독자 50만 채널' 등)"
    }
  ],
  "reading_tip": "이 책을 잘 읽는 방법 (2-3문장)"
}

async function analyzeBook() {
  const apiKey = $('apiKey').value.trim();
  if (!apiKey) {
    showError('API Key를 먼저 입력해주세요.');
    return;
  }
  if (!currentImageData) {
    showError('이미지를 먼저 업로드해주세요.');
    return;
  }

  $('analyzeBtn').classList.add('hidden');
  $('loading').classList.remove('hidden');
  $('errorBox').innerHTML = '';
  $('resultBox').innerHTML = '';

  const requestBody = {
    systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
    contents: [{
      role: 'user',
      parts: [
        { inlineData: { mimeType: currentImageType, data: currentImageData } },
        { text: USER_PROMPT }
      ]
    }],
    // Grounding with Google Search 활성화
    tools: [{ googleSearch: {} }],
    generationConfig: {
      temperature: 0.5,  // grounding 사용 시 일관성 위해 낮춤
      maxOutputTokens: 8192
      // 주의: responseMimeType은 grounding과 함께 사용할 수 없으므로 제거
      // thinkingConfig도 도구 사용과 호환성 위해 제거
    }
  };

  try {
    const { responseText, groundingMetadata } = await callGeminiWithFallback(apiKey, requestBody);

    // JSON 추출 강화 (텍스트 안에 섞여 있을 수 있음)
    const jsonText = extractJsonFromText(responseText);

    let result;
    try {
      result = JSON.parse(jsonText);
    } catch (parseErr) {
      result = tryRecoverTruncatedJson(jsonText);
      if (!result) {
        throw new Error(`응답에서 JSON을 파싱할 수 없습니다. 다시 시도해주세요. (원본 오류: ${parseErr.message})`);
      }
      showError('⚠️ 응답이 일부 잘렸지만 복구해서 표시합니다. 일부 항목이 누락될 수 있어요.');
    }

    // Grounding 메타데이터를 결과에 병합 (검증된 출처 정보)
    if (groundingMetadata) {
      result._groundingMetadata = groundingMetadata;
    }

    renderResult(result);
    $('resetBtn').classList.remove('hidden');
  } catch (err) {
    showError('분석 중 오류: ' + err.message);
    $('analyzeBtn').classList.remove('hidden');
  } finally {
    $('loading').classList.add('hidden');
    updateLoadingStatus('');
  }
}

// JSON 추출 (응답 텍스트에 JSON이 다른 텍스트와 섞여 있을 때)
function extractJsonFromText(text) {
  // 마크다운 코드블록 제거
  let cleaned = text.replace(/```json\s*|```\s*/g, '').trim();

  // 첫 { 부터 마지막 } 까지 추출
  const firstBrace = cleaned.indexOf('{');
  const lastBrace = cleaned.lastIndexOf('}');

  if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
    return cleaned.slice(firstBrace, lastBrace + 1);
  }

  return cleaned;
}

async function callGeminiWithFallback(apiKey, requestBody) {
  let lastError = null;

  for (let modelIdx = 0; modelIdx < MODELS.length; modelIdx++) {
    const model = MODELS[modelIdx];

    for (let attempt = 0; attempt <= MAX_RETRIES_PER_MODEL; attempt++) {
      try {
        if (modelIdx === 0 && attempt === 0) {
          updateLoadingStatus('Google 검색으로 자료를 수집하고 있습니다…');
        } else if (attempt > 0) {
          updateLoadingStatus(`서버 혼잡으로 재시도 중… (${model}, ${attempt}/${MAX_RETRIES_PER_MODEL})`);
        } else {
          updateLoadingStatus(`다른 모델로 재시도 중… (${model})`);
        }

        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`;
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(requestBody)
        });

        if (response.ok) {
          const data = await response.json();
          const responseText = data.candidates?.[0]?.content?.parts
            ?.filter(p => p.text).map(p => p.text).join('') || '';
          if (!responseText) throw new Error('빈 응답을 받았습니다.');

          // Grounding 메타데이터도 함께 반환
          const groundingMetadata = data.candidates?.[0]?.groundingMetadata || null;
          return { responseText, groundingMetadata };
        }

        const errText = await response.text();
        let errMsg = `API 오류 (${response.status})`;
        try {
          const errJson = JSON.parse(errText);
          errMsg += `: ${errJson.error?.message || errText}`;
        } catch { errMsg += `: ${errText}`; }

        if (!RETRYABLE_STATUS.includes(response.status)) {
          throw new Error(errMsg);
        }

        lastError = new Error(errMsg);

        if (attempt < MAX_RETRIES_PER_MODEL) {
          const delay = Math.min(1000 * Math.pow(2, attempt) + Math.random() * 500, 8000);
          await sleep(delay);
        }
      } catch (err) {
        lastError = err;
        if (err.message.includes('API 오류') && !RETRYABLE_STATUS.some(s => err.message.includes(`(${s})`))) {
          throw err;
        }
        if (attempt < MAX_RETRIES_PER_MODEL) {
          const delay = Math.min(1000 * Math.pow(2, attempt) + Math.random() * 500, 8000);
          await sleep(delay);
        }
      }
    }
  }

  throw new Error(
    `모든 모델에서 실패했습니다. Google 서버가 일시적으로 혼잡한 상태입니다. ` +
    `잠시 후 다시 시도해주세요.\n마지막 오류: ${lastError?.message || '알 수 없음'}`
  );
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ====== JSON 복구 (응답 잘림 대응) ======

function tryRecoverTruncatedJson(text) {
  // 전략: 마지막으로 완전한 객체/배열까지만 잘라내고 닫는 괄호를 보강
  // 1) 가장 먼저 끝까지 통째 닫기 시도
  for (let trim = 0; trim < text.length; trim++) {
    let candidate = text.slice(0, text.length - trim);
    // 마지막 쉼표 제거
    candidate = candidate.replace(/,\s*$/, '');
    // 미완성 문자열 끊기 (마지막 따옴표 짝 맞추기)
    const lastQuote = candidate.lastIndexOf('"');
    const beforeQuote = candidate.slice(0, lastQuote);
    const quoteCount = (beforeQuote.match(/(?<!\\)"/g) || []).length;
    if (quoteCount % 2 === 1) {
      // 마지막 따옴표가 열린 상태 → 그 따옴표 직전까지 자르기
      candidate = candidate.slice(0, lastQuote).replace(/,\s*$/, '');
    }
    // 괄호 수 세기
    let braces = 0, brackets = 0;
    let inStr = false, escape = false;
    for (const c of candidate) {
      if (escape) { escape = false; continue; }
      if (c === '\\') { escape = true; continue; }
      if (c === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (c === '{') braces++;
      else if (c === '}') braces--;
      else if (c === '[') brackets++;
      else if (c === ']') brackets--;
    }
    if (braces < 0 || brackets < 0) continue;
    // 닫는 괄호 보강
    let closed = candidate.replace(/,\s*$/, '');
    closed += ']'.repeat(brackets);
    closed += '}'.repeat(braces);
    try {
      return JSON.parse(closed);
    } catch { /* 계속 시도 */ }
    if (trim > 2000) break; // 너무 많이 자르면 포기
  }
  return null;
}

function getDomainInfo(url) {
  try {
    const u = new URL(url);
    const host = u.hostname.replace(/^www\./, '');

    // 정확한 매치
    if (TRUSTED_DOMAINS[host]) {
      return { ...TRUSTED_DOMAINS[host], domain: host, trusted: true };
    }

    // 부분 매치 (서브도메인 등)
    for (const [trustedHost, info] of Object.entries(TRUSTED_DOMAINS)) {
      if (host.endsWith('.' + trustedHost) || host === trustedHost) {
        return { ...info, domain: host, trusted: true };
      }
    }

    // 학술 도메인 패턴
    if (/\.(ac\.kr|edu|edu\.[a-z]+|gov)$/.test(host)) {
      return { weight: 7, label: '학술·기관', domain: host, trusted: true };
    }

    return { weight: 3, label: host, domain: host, trusted: false };
  } catch {
    return null;
  }
}

function isValidUrl(url) {
  if (!url || typeof url !== 'string') return false;
  if (!/^https?:\/\//.test(url)) return false;
  try {
    new URL(url);
    return true;
  } catch {
    return false;
  }
}

function renderResources(resources, groundingMetadata) {
  if (!resources || resources.length === 0) {
    // resources가 비어있어도 grounding chunks가 있으면 그것을 표시
    if (groundingMetadata?.groundingChunks?.length > 0) {
      return renderGroundingFallback(groundingMetadata);
    }
    return '';
  }

  // 유효한 URL 가진 자료만 필터링
  const validResources = resources
    .filter(r => isValidUrl(r.url))
    .map(r => {
      const domainInfo = getDomainInfo(r.url);
      return { ...r, _domainInfo: domainInfo };
    })
    .sort((a, b) => {
      // 1차: 자료 유형 우선순위 (학술 우선)
      const priA = RESOURCE_META[a.type]?.priority || 99;
      const priB = RESOURCE_META[b.type]?.priority || 99;
      if (priA !== priB) return priA - priB;
      // 2차: 도메인 신뢰도
      return (b._domainInfo?.weight || 0) - (a._domainInfo?.weight || 0);
    });

  if (validResources.length === 0) {
    return `
      <div class="disclaimer">
        ⚠️ Google 검색에서 신뢰할 만한 직접 링크를 찾지 못했습니다.
        대신 책 제목으로 직접 검색해보시거나, 잠시 후 다시 시도해주세요.
      </div>`;
  }

  const cards = validResources.map(r => {
    const meta = RESOURCE_META[r.type] || { icon: '🔗', label: '자료' };
    const domain = r._domainInfo;
    const isTrusted = domain?.trusted;
    const sourceName = r.source_name || domain?.label || domain?.domain || '';

    return `
      <div class="resource-card ${isTrusted ? 'trusted' : ''}">
        <div class="resource-icon">${meta.icon}</div>
        <div class="resource-body">
          <div class="resource-header">
            <span class="resource-type">${meta.label}</span>
            ${isTrusted ? `<span class="trust-badge">✓ ${escapeHtml(sourceName)}</span>` : `<span class="trust-badge untrusted">${escapeHtml(sourceName)}</span>`}
          </div>
          <div class="resource-title">${escapeHtml(r.title || '-')}</div>
          ${r.description ? `<div class="resource-desc">${escapeHtml(r.description)}</div>` : ''}
          ${r.credibility_signal ? `<div class="credibility">📊 ${escapeHtml(r.credibility_signal)}</div>` : ''}
          <a class="resource-link" href="${escapeAttr(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.url)} ↗</a>
        </div>
      </div>`;
  }).join('');

  // Grounding 출처 정보 (Google 공식 표시 요구사항)
  let groundingFooter = '';
  if (groundingMetadata?.searchEntryPoint?.renderedContent) {
    groundingFooter = `
      <div class="grounding-footer">
        <div class="grounding-label">🔍 Google 검색으로 검증된 자료입니다</div>
        <div class="search-suggestions">${groundingMetadata.searchEntryPoint.renderedContent}</div>
      </div>`;
  }

  return `
    <div class="resources">${cards}</div>
    ${groundingFooter}
    <div class="disclaimer">
      ✅ 위 링크는 Google 검색을 통해 실제 존재하는 자료로 확인된 URL입니다.
      다만 자료의 학술적 품질·관련성은 직접 확인을 권장합니다.
    </div>`;
}

function renderGroundingFallback(groundingMetadata) {
  const chunks = groundingMetadata.groundingChunks || [];
  if (chunks.length === 0) return '';

  const cards = chunks.slice(0, 6).map(chunk => {
    const web = chunk.web || {};
    const url = web.uri || '';
    const title = web.title || url;
    if (!isValidUrl(url)) return '';
    const domain = getDomainInfo(url);
    const isTrusted = domain?.trusted;
    return `
      <div class="resource-card ${isTrusted ? 'trusted' : ''}">
        <div class="resource-icon">🔗</div>
        <div class="resource-body">
          <div class="resource-header">
            <span class="resource-type">검색 결과</span>
            ${isTrusted ? `<span class="trust-badge">✓ ${escapeHtml(domain.label)}</span>` : ''}
          </div>
          <div class="resource-title">${escapeHtml(title)}</div>
          <a class="resource-link" href="${escapeAttr(url)}" target="_blank" rel="noopener">${escapeHtml(url)} ↗</a>
        </div>
      </div>`;
  }).filter(Boolean).join('');

  return `<div class="resources">${cards}</div>`;
}

function renderResult(r) {
  const box = $('resultBox');

  if (r.identified === false) {
    box.innerHTML = `
      <div class="result">
        <div class="result-section">
          <h2>식별 결과</h2>
          <div class="book-title">책을 정확히 식별하기 어려웠습니다</div>
          <p class="info-text" style="margin-top:12px;"><strong>이유:</strong> ${escapeHtml(r.reason || '-')}</p>
          <p class="info-text" style="margin-top:8px;"><strong>사진에서 본 단서:</strong> ${escapeHtml(r.what_i_see || '-')}</p>
        </div>
      </div>`;
    return;
  }

  const confidenceLabel = { high: '높음', medium: '보통', low: '낮음' }[r.confidence] || r.confidence;
  const contextLabel = r.context_section_label || '맥락 분석';

  const recHtml = (r.recommendations || []).map(rec => {
    const typeLabel = { similar: '유사 (Similar)', contrast: '대조 (Contrast)', deeper: '심화 (Deeper)' }[rec.type] || rec.type;
    return `
      <div class="rec-card ${rec.type}">
        <div class="rec-type">${typeLabel}</div>
        <div class="rec-title">${escapeHtml(rec.title)} <span style="color:#a0a0c0;font-weight:400;">— ${escapeHtml(rec.author)}</span></div>
        <div class="rec-reason">${escapeHtml(rec.reason)}</div>
      </div>`;
  }).join('');

  box.innerHTML = `
    <div class="result">
      <div class="result-section">
        <h2>식별된 책 (신뢰도: ${confidenceLabel})</h2>
        <div class="book-title">${escapeHtml(r.title)}</div>
        <div class="book-author">${escapeHtml(r.author)}</div>
        <div class="book-meta">${escapeHtml(r.publisher_year)} · ${escapeHtml(r.genre)}</div>
      </div>

      <div class="result-section">
        <h2>핵심 소개</h2>
        <p class="info-text">${escapeHtml(r.summary)}</p>
      </div>

      <div class="result-section">
        <h2>${escapeHtml(contextLabel)}</h2>
        <p class="info-text">${escapeHtml(r.context_analysis)}</p>
      </div>

      <div class="result-section">
        <h2>비평적 시각</h2>
        <p class="info-text">${escapeHtml(r.critical_view)}</p>
        ${(r.resources && r.resources.length > 0) || r._groundingMetadata ? `
          <h2 style="margin-top:20px;">📚 참조 자료</h2>
          ${renderResources(r.resources || [], r._groundingMetadata)}
        ` : ''}
      </div>

      <div class="result-section">
        <h2>함께 읽으면 좋은 책</h2>
        <div class="recommendations">${recHtml}</div>
      </div>

      <div class="result-section">
        <h2>읽기 팁</h2>
        <p class="info-text">${escapeHtml(r.reading_tip)}</p>
      </div>
    </div>`;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}
function escapeAttr(s) { return escapeHtml(s); }

function showError(msg) {
  $('errorBox').innerHTML = `<div class="error">⚠️ ${escapeHtml(msg)}</div>`;
}

function resetAll() {
  currentImageData = null;
  currentImageType = null;
  fileInput.value = '';
  $('preview').classList.add('hidden');
  $('analyzeBtn').classList.add('hidden');
  $('resultBox').innerHTML = '';
  $('errorBox').innerHTML = '';
  $('resetBtn').classList.add('hidden');
}
</script>
</body>
</html>
