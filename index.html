<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 책 큐레이션 AI (Gemini)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #e8e8e8;
    min-height: 100vh;
    padding: 20px;
    line-height: 1.6;
  }
  .container { max-width: 800px; margin: 0 auto; }
  header {
    text-align: center;
    margin-bottom: 30px;
    padding: 20px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  h1 { font-size: 28px; margin-bottom: 8px; }
  .subtitle { color: #a0a0c0; font-size: 14px; }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    background: rgba(108,141,255,0.2);
    border: 1px solid rgba(108,141,255,0.4);
    border-radius: 12px;
    font-size: 11px;
    color: #a0baff;
    margin-top: 8px;
  }

  .api-key-section {
    background: rgba(255,255,255,0.05);
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 20px;
  }
  .api-key-section label {
    display: block;
    font-size: 13px;
    color: #a0a0c0;
    margin-bottom: 8px;
  }
  .api-key-section input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: rgba(0,0,0,0.3);
    color: #e8e8e8;
    font-size: 13px;
    font-family: monospace;
  }
  .api-key-section .hint {
    font-size: 11px;
    color: #6b6b8a;
    margin-top: 6px;
  }
  .api-key-section .hint a { color: #6c8dff; }

  .upload-area {
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: rgba(255,255,255,0.03);
    margin-bottom: 20px;
  }
  .upload-area:hover, .upload-area.dragover {
    border-color: #6c8dff;
    background: rgba(108,141,255,0.08);
  }
  .upload-area .icon { font-size: 48px; margin-bottom: 12px; }
  .upload-area .text { font-size: 16px; margin-bottom: 4px; }
  .upload-area .hint { font-size: 12px; color: #a0a0c0; }
  #fileInput { display: none; }

  .preview { margin-bottom: 20px; text-align: center; }
  .preview img {
    max-width: 100%;
    max-height: 400px;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .analyze-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #6c8dff 0%, #9b6cff 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
    margin-bottom: 20px;
  }
  .analyze-btn:hover:not(:disabled) { transform: translateY(-2px); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .loading { text-align: center; padding: 30px; color: #a0a0c0; }
  .spinner {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #6c8dff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result {
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .result-section {
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .result-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .result-section h2 {
    font-size: 14px;
    color: #6c8dff;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .book-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .book-author { font-size: 15px; color: #a0a0c0; margin-bottom: 8px; }
  .book-meta { font-size: 13px; color: #6b6b8a; }
  .info-text { font-size: 14px; color: #d0d0e0; }

  .recommendations { display: grid; gap: 12px; }
  .rec-card {
    background: rgba(0,0,0,0.25);
    padding: 14px;
    border-radius: 10px;
    border-left: 3px solid #6c8dff;
  }
  .rec-card.contrast { border-left-color: #ff9b6c; }
  .rec-card.deeper { border-left-color: #6cffaa; }
  .rec-type {
    font-size: 11px;
    color: #6c8dff;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .rec-card.contrast .rec-type { color: #ff9b6c; }
  .rec-card.deeper .rec-type { color: #6cffaa; }
  .rec-title { font-weight: 600; margin-bottom: 4px; font-size: 15px; }
  .rec-reason { font-size: 13px; color: #b0b0c8; }

  .error {
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff9999;
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 14px;
    word-break: break-word;
  }

  .reset-btn {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.08);
    color: #e8e8e8;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.12); }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📚 책 큐레이션 AI</h1>
    <p class="subtitle">서점에서 만난 책 한 권, 깊이 읽기를 위한 안내자</p>
    <div class="badge">Powered by Google Gemini 2.5 Flash</div>
  </header>

  <div class="api-key-section">
    <label>🔑 Google AI Studio API Key</label>
    <input type="password" id="apiKey" placeholder="AIza..." />
    <p class="hint">
      무료 발급: <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a> · 카드 등록 불필요 · 일 1,500회 무료
    </p>
  </div>

  <div class="upload-area" id="uploadArea">
    <div class="icon">📷</div>
    <div class="text">책 표지나 서점 매대 사진을 올려주세요</div>
    <div class="hint">클릭 또는 드래그앤드롭 · JPG/PNG/WEBP</div>
    <input type="file" id="fileInput" accept="image/*" />
  </div>

  <div class="preview hidden" id="preview">
    <img id="previewImg" alt="업로드된 이미지" />
  </div>

  <button class="analyze-btn hidden" id="analyzeBtn">✨ 분석 시작</button>

  <div class="loading hidden" id="loading">
    <div class="spinner"></div>
    <div>책을 살펴보고 있습니다…</div>
  </div>

  <div id="errorBox"></div>
  <div id="resultBox"></div>

  <button class="reset-btn hidden" id="resetBtn">🔄 다른 책 분석하기</button>
</div>

<script>
// ============================================================
// 책 큐레이션 AI - Google Gemini API + 프롬프트 엔지니어링
// ============================================================

const MODEL = 'gemini-2.5-flash';

const SYSTEM_PROMPT = `당신은 한국과 세계문학 양쪽에 깊이 정통한 서점 큐레이터이자 문학 비평가입니다.
독자가 서점에서 책 표지나 매대 사진을 보여주면, 그 책을 식별하고 깊이 있는 큐레이션을 제공합니다.

당신의 큐레이션 원칙:
1. 단순한 줄거리 요약이 아니라, 책의 문학사적·사상적 위치를 짚어줍니다.
2. 비평적 평가는 균형 잡힌 시각으로 제시합니다 (호평과 비판 모두).
3. 추천 도서는 반드시 세 종류로 구성합니다:
   - similar (유사): 같은 주제·정서를 더 깊이 탐구한 책
   - contrast (대조): 같은 주제를 반대 입장에서 다룬 책
   - deeper (심화): 이 책의 이론적·역사적 배경을 이해할 수 있는 책
4. 추측이 필요한 경우 명시적으로 "추정"임을 밝힙니다.
5. 책을 식별할 수 없으면 솔직히 그렇게 답합니다.

출력은 반드시 다음 JSON 형식만 따릅니다. 다른 텍스트나 마크다운 코드블록은 절대 포함하지 마세요.

{
  "identified": true 또는 false,
  "confidence": "high" | "medium" | "low",
  "title": "책 제목 (원어와 한국어 병기)",
  "author": "저자명",
  "publisher_year": "출판사, 출판연도 (확실하지 않으면 '추정: ...')",
  "genre": "장르·분류",
  "summary": "2-3문장의 핵심 소개",
  "literary_position": "이 책의 문학사적·사상적 위치 (3-4문장)",
  "critical_view": "비평적 평가, 호평과 비판을 균형 있게 (3-4문장)",
  "recommendations": [
    { "type": "similar", "title": "책 제목", "author": "저자", "reason": "추천 이유 (1-2문장)" },
    { "type": "contrast", "title": "책 제목", "author": "저자", "reason": "추천 이유 (1-2문장)" },
    { "type": "deeper", "title": "책 제목", "author": "저자", "reason": "추천 이유 (1-2문장)" }
  ],
  "reading_tip": "이 책을 가장 잘 읽는 방법에 대한 짧은 조언 (2-3문장)"
}

만약 책을 식별할 수 없는 경우:
{
  "identified": false,
  "reason": "식별 불가 이유",
  "what_i_see": "사진에서 보이는 단서 (제목 일부, 저자명, 디자인 특징 등)"
}`;

const USER_PROMPT = `이 사진을 분석해주세요. 서점에서 찍은 사진일 수 있습니다.

만약 여러 권의 책이 있다면, 가장 두드러진 한 권을 골라 분석해주세요.
표지가 명확하다면 그 책을, 매대 전체라면 가장 앞에 있거나 가장 큰 책을 선택합니다.

JSON 형식만으로 답하세요. 마크다운 코드블록(\`\`\`)도 절대 쓰지 마세요.`;

const $ = (id) => document.getElementById(id);
let currentImageData = null;
let currentImageType = null;

// ----- API 키 세션 저장 -----
const savedKey = sessionStorage.getItem('gemini_api_key');
if (savedKey) $('apiKey').value = savedKey;
$('apiKey').addEventListener('change', (e) => {
  sessionStorage.setItem('gemini_api_key', e.target.value);
});

// ----- 이미지 업로드 처리 -----
const uploadArea = $('uploadArea');
const fileInput = $('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadArea.classList.add('dragover');
});
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

function handleFile(file) {
  if (!file.type.startsWith('image/')) {
    showError('이미지 파일만 업로드 가능합니다.');
    return;
  }
  if (file.size > 5 * 1024 * 1024) {
    showError('파일 크기는 5MB 이하여야 합니다.');
    return;
  }
  currentImageType = file.type;
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    currentImageData = dataUrl.split(',')[1];
    $('previewImg').src = dataUrl;
    $('preview').classList.remove('hidden');
    $('analyzeBtn').classList.remove('hidden');
    $('errorBox').innerHTML = '';
  };
  reader.readAsDataURL(file);
}

// ----- 분석 실행 -----
$('analyzeBtn').addEventListener('click', analyzeBook);
$('resetBtn').addEventListener('click', resetAll);

async function analyzeBook() {
  const apiKey = $('apiKey').value.trim();
  if (!apiKey) {
    showError('API Key를 먼저 입력해주세요. (https://aistudio.google.com/app/apikey 에서 무료 발급)');
    return;
  }
  if (!currentImageData) {
    showError('이미지를 먼저 업로드해주세요.');
    return;
  }

  $('analyzeBtn').classList.add('hidden');
  $('loading').classList.remove('hidden');
  $('errorBox').innerHTML = '';
  $('resultBox').innerHTML = '';

  try {
    // Gemini API 엔드포인트 (v1beta, generateContent)
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`;

    const requestBody = {
      // 시스템 지시사항
      systemInstruction: {
        parts: [{ text: SYSTEM_PROMPT }]
      },
      // 사용자 메시지 (이미지 + 텍스트)
      contents: [{
        role: 'user',
        parts: [
          {
            inlineData: {
              mimeType: currentImageType,
              data: currentImageData
            }
          },
          { text: USER_PROMPT }
        ]
      }],
      generationConfig: {
        temperature: 0.7,
        maxOutputTokens: 2048,
        responseMimeType: 'application/json'  // JSON 모드 강제
      }
    };

    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });

    if (!response.ok) {
      const errText = await response.text();
      let errMsg = `API 오류 (${response.status})`;
      try {
        const errJson = JSON.parse(errText);
        errMsg += `: ${errJson.error?.message || errText}`;
      } catch {
        errMsg += `: ${errText}`;
      }
      throw new Error(errMsg);
    }

    const data = await response.json();

    // Gemini 응답 구조: candidates[0].content.parts[0].text
    const responseText = data.candidates?.[0]?.content?.parts
      ?.filter(p => p.text)
      .map(p => p.text)
      .join('') || '';

    if (!responseText) {
      throw new Error('빈 응답을 받았습니다. 다시 시도해주세요.');
    }

    // 혹시 마크다운 코드블록이 섞여 들어와도 대응
    const cleaned = responseText.replace(/```json\s*|```\s*/g, '').trim();
    const result = JSON.parse(cleaned);

    renderResult(result);
    $('resetBtn').classList.remove('hidden');
  } catch (err) {
    showError('분석 중 오류: ' + err.message);
    $('analyzeBtn').classList.remove('hidden');
  } finally {
    $('loading').classList.add('hidden');
  }
}

// ----- 결과 렌더링 -----
function renderResult(r) {
  const box = $('resultBox');

  if (r.identified === false) {
    box.innerHTML = `
      <div class="result">
        <div class="result-section">
          <h2>식별 결과</h2>
          <div class="book-title">책을 정확히 식별하기 어려웠습니다</div>
          <p class="info-text" style="margin-top:12px;"><strong>이유:</strong> ${escapeHtml(r.reason || '-')}</p>
          <p class="info-text" style="margin-top:8px;"><strong>사진에서 본 단서:</strong> ${escapeHtml(r.what_i_see || '-')}</p>
        </div>
      </div>`;
    return;
  }

  const confidenceLabel = { high: '높음', medium: '보통', low: '낮음' }[r.confidence] || r.confidence;

  const recHtml = (r.recommendations || []).map(rec => {
    const typeLabel = { similar: '유사 (Similar)', contrast: '대조 (Contrast)', deeper: '심화 (Deeper)' }[rec.type] || rec.type;
    return `
      <div class="rec-card ${rec.type}">
        <div class="rec-type">${typeLabel}</div>
        <div class="rec-title">${escapeHtml(rec.title)} <span style="color:#a0a0c0;font-weight:400;">— ${escapeHtml(rec.author)}</span></div>
        <div class="rec-reason">${escapeHtml(rec.reason)}</div>
      </div>`;
  }).join('');

  box.innerHTML = `
    <div class="result">
      <div class="result-section">
        <h2>식별된 책 (신뢰도: ${confidenceLabel})</h2>
        <div class="book-title">${escapeHtml(r.title)}</div>
        <div class="book-author">${escapeHtml(r.author)}</div>
        <div class="book-meta">${escapeHtml(r.publisher_year)} · ${escapeHtml(r.genre)}</div>
      </div>

      <div class="result-section">
        <h2>핵심 소개</h2>
        <p class="info-text">${escapeHtml(r.summary)}</p>
      </div>

      <div class="result-section">
        <h2>문학사적 위치</h2>
        <p class="info-text">${escapeHtml(r.literary_position)}</p>
      </div>

      <div class="result-section">
        <h2>비평적 시각</h2>
        <p class="info-text">${escapeHtml(r.critical_view)}</p>
      </div>

      <div class="result-section">
        <h2>함께 읽으면 좋은 책</h2>
        <div class="recommendations">${recHtml}</div>
      </div>

      <div class="result-section">
        <h2>읽기 팁</h2>
        <p class="info-text">${escapeHtml(r.reading_tip)}</p>
      </div>
    </div>`;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function showError(msg) {
  $('errorBox').innerHTML = `<div class="error">⚠️ ${escapeHtml(msg)}</div>`;
}

function resetAll() {
  currentImageData = null;
  currentImageType = null;
  fileInput.value = '';
  $('preview').classList.add('hidden');
  $('analyzeBtn').classList.add('hidden');
  $('resultBox').innerHTML = '';
  $('errorBox').innerHTML = '';
  $('resetBtn').classList.add('hidden');
}
</script>
</body>
</html>
