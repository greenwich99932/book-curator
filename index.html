<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 책 큐레이션 AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);

  .container { max-width: 800px; margin: 0 auto; }

    text-align: center;

    padding: 20px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  h1 { font-size: 28px; margin-bottom: 8px; }
  .subtitle { color: #a0a0c0; font-size: 14px; }
  .badge {

  }
  .api-key-section input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: rgba(0,0,0,0.3);

  }
  .upload-area .icon { font-size: 48px; margin-bottom: 12px; }
  .upload-area .text { font-size: 16px; margin-bottom: 4px; }
  .upload-area .hint { font-size: 12px; color: #a0a0c0; }
  #fileInput { display: none; }

  .preview { margin-bottom: 20px; text-align: center; }
  .preview img {

  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .loading { text-align: center; padding: 30px; color: #a0a0c0; }
  .spinner {
    display: inline-block;
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #6c8dff;
    border-radius: 50%;

    margin-bottom: 12px;

  @keyframes spin { to { transform: rotate(360deg); } }

  .result {
    background: rgba(255,255,255,0.04);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .result-section {
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .result-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .result-section h2 {
    font-size: 14px;
    color: #6c8dff;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .book-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .book-author { font-size: 15px; color: #a0a0c0; margin-bottom: 8px; }
  .book-meta { font-size: 13px; color: #6b6b8a; }
  .info-text { font-size: 14px; color: #d0d0e0; }

  .recommendations { display: grid; gap: 12px; }
  .rec-card {
    background: rgba(0,0,0,0.25);
    padding: 14px;
    border-radius: 10px;
    border-left: 3px solid #6c8dff;
  }
  .rec-card.contrast { border-left-color: #ff9b6c; }
  .rec-card.deeper { border-left-color: #6cffaa; }
  .rec-type {
    font-size: 11px;
    color: #6c8dff;
    text-transform: uppercase;

    margin-bottom: 6px;
    font-weight: 600;
  }
  .rec-card.contrast .rec-type { color: #ff9b6c; }
  .rec-card.deeper .rec-type { color: #6cffaa; }
  .rec-title { font-weight: 600; margin-bottom: 4px; font-size: 15px; }
  .rec-reason { font-size: 13px; color: #b0b0c8; }

  /* 참조 자료 카드 */
  .resources { display: grid; gap: 10px; margin-top: 12px; }
  .resource-card {
    background: rgba(0,0,0,0.2);
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.05);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .resource-icon {
    font-size: 20px;

  .resource-body { flex: 1; min-width: 0; }
  .resource-type {

  .resource-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; word-break: break-word; }
  .resource-desc { font-size: 12px; color: #a0a0c0; margin-bottom: 6px; }
  .resource-link {
    display: inline-block;

  .resource-link:hover { text-decoration: underline; }
  .resource-search {
    display: inline-block;

  .resource-search a { color: inherit; text-decoration: none; }

  .disclaimer {

    color: #6b6b8a;

    border-radius: 4px;
  }

  .error {
    background: rgba(255,80,80,0.1);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff9999;
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 14px;
    word-break: break-word;

  .reset-btn {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.08);
    color: #e8e8e8;

    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.12); }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📚 책 큐레이션 AI</h1>
    <p class="subtitle">서점에서 만난 책 한 권, 깊이 읽기를 위한 안내자</p>
    <div class="badge">Powered by Google Gemini 2.5 Flash</div>
  </header>

  <div class="api-key-section">
    <label>🔑 Google AI Studio API Key</label>
    <input type="password" id="apiKey" placeholder="AIza..." />
    <p class="hint">
      무료 발급: <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a> · 카드 등록 불필요 · 일 1,500회 무료
    </p>
  </div>

  <div class="upload-area" id="uploadArea">
    <div class="icon">📷</div>
    <div class="text">책 표지나 서점 매대 사진을 올려주세요</div>
    <div class="hint">클릭 또는 드래그앤드롭 · JPG/PNG/WEBP</div>
    <input type="file" id="fileInput" accept="image/*" />
  </div>

  <div class="preview hidden" id="preview">
    <img id="previewImg" alt="업로드된 이미지" />
  </div>

  <button class="analyze-btn hidden" id="analyzeBtn">✨ 분석 시작</button>

  <div class="loading hidden" id="loading">
    <div class="spinner"></div>
    <div>책을 살펴보고 있습니다…</div>
  </div>

  <div id="errorBox"></div>
  <div id="resultBox"></div>

  <button class="reset-btn hidden" id="resetBtn">🔄 다른 책 분석하기</button>
</div>

<script>
// ============================================================
// 책 큐레이션 AI v2 - 동적 메뉴 + 참조 자료
// ============================================================

const MODEL = 'gemini-2.5-flash';

const SYSTEM_PROMPT = `당신은 한국과 세계의 모든 분야 도서에 정통한 서점 큐레이터이자 비평가입니다.
독자가 책 표지나 매대 사진을 보여주면, 그 책을 식별하고 깊이 있는 큐레이션을 제공합니다.

【중요 원칙】

1. **장르 적응**: 책의 장르와 성격에 따라 분석 섹션의 명칭을 달리합니다. 다음 예시를 참고하되, 책에 가장 맞는 명칭을 자유롭게 만드세요.
   - 소설/문학 → "문학사적 위치"
   - 철학·사상 → "사상사적 좌표"
   - 경제·경영 → "시장·산업적 맥락"
   - 자기계발 → "동시대 담론에서의 위치"
   - 과학 → "과학사적 의의"
   - 역사 → "역사학적 위치"
   - 사회학 → "사회과학적 맥락"
   - 법·정치 → "제도사적·정책적 맥락"
   - 종교·신학 → "신학적·교회사적 위치"
   - 예술·미학 → "예술사적 좌표"
   - 시 → "시사(詩史)적 위치"
   - 에세이 → "동시대 문화적 맥락"

2. **균형 잡힌 비평**: 호평과 비판을 함께 제시합니다.

3. **추천 도서 3종 구성**:
   - similar (유사): 같은 주제·정서를 더 깊이 탐구한 책
   - contrast (대조): 같은 주제를 반대 입장에서 다룬 책
   - deeper (심화): 이 책의 이론적·역사적 배경을 이해할 수 있는 책

4. **참조 자료 (매우 중요)**: 비평적 시각을 보완할 외부 자료를 추천합니다.

   ⚠️ URL 환각 방지 규칙:
   - URL은 100% 확실히 존재하고 안정적으로 유지될 자료만 제공하세요.
   - 불확실하면 URL을 절대 만들지 말고, "search_query" 필드에 검색 쿼리만 제공하세요.
   - 검증된 URL만 허용: 위키백과, 주요 언론사 메인 페이지(NYT, Guardian, 조선·중앙·한겨레·경향 등), 출판사 공식 페이지, 저자 공식 웹사이트, 잘 알려진 학자/비평가의 공식 페이지
   - 확실하지 않은 모든 경우 → URL 대신 search_query 사용

   자료 유형(type):
   - "academic": 논문, 학술 자료 → 보통 search_query만 제공 (Google Scholar 등에서 찾도록)
   - "video": YouTube 영상, 강연 → 채널명과 search_query 위주
   - "news": 언론 기사 → 매체명 명시
   - "blog": 비평가 블로그, 개인 사이트
   - "social": X(트위터), SNS 토론
   - "review": 독립 서평지, 문학잡지

5. **솔직함**: 식별 불가능하면 그렇게 답하고, 추측은 "추정"임을 명시합니다.

【출력 형식】
반드시 다음 JSON 형식만 따르세요. 마크다운 코드블록 사용 금지.

{
  "identified": true 또는 false,
  "confidence": "high" | "medium" | "low",
  "title": "책 제목 (원어/한국어 병기)",
  "author": "저자명",
  "publisher_year": "출판사, 출판연도",
  "genre": "구체적 장르 분류",
  "context_section_label": "이 책에 맞는 맥락 섹션 명칭 (예: 문학사적 위치, 사상사적 좌표 등)",
  "summary": "2-3문장 핵심 소개",
  "context_analysis": "위 context_section_label에 해당하는 3-4문장 분석",
  "critical_view": "비평적 평가, 호평과 비판 균형 (3-4문장)",
  "recommendations": [
    { "type": "similar", "title": "...", "author": "...", "reason": "..." },
    { "type": "contrast", "title": "...", "author": "...", "reason": "..." },
    { "type": "deeper", "title": "...", "author": "...", "reason": "..." }
  ],
  "resources": [
    {
      "type": "academic|video|news|blog|social|review",
      "title": "자료 제목",
      "description": "왜 참조할 가치가 있는지 1문장",
      "url": "확실한 URL 또는 null",
      "search_query": "URL이 null일 때 검색 쿼리"
    }
  ],
  "reading_tip": "이 책을 가장 잘 읽는 방법 (2-3문장)"
}

자료(resources)는 최소 4개, 최대 6개. 가능하면 다양한 유형으로 구성.

식별 불가능한 경우:
{
  "identified": false,
  "reason": "이유",
  "what_i_see": "사진에서 본 단서"
}`;

const USER_PROMPT = `이 사진을 분석해주세요. 책 표지 또는 서점 매대 사진일 수 있습니다.
여러 권이 보이면 가장 두드러진 한 권을 골라주세요.
JSON 형식만으로 답하고, 마크다운 코드블록은 절대 사용하지 마세요.`;

const $ = (id) => document.getElementById(id);
let currentImageData = null;
let currentImageType = null;

// API 키 세션 저장
const savedKey = sessionStorage.getItem('gemini_api_key');
if (savedKey) $('apiKey').value = savedKey;
$('apiKey').addEventListener('change', (e) => {
  sessionStorage.setItem('gemini_api_key', e.target.value);
});

// 업로드 처리
const uploadArea = $('uploadArea');
const fileInput = $('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadArea.classList.add('dragover');
});
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

function handleFile(file) {
  if (!file.type.startsWith('image/')) {
    showError('이미지 파일만 업로드 가능합니다.');
    return;
  }
  if (file.size > 5 * 1024 * 1024) {
    showError('파일 크기는 5MB 이하여야 합니다.');
    return;
  }
  currentImageType = file.type;
  const reader = new FileReader();
  reader.onload = (e) => {
    const dataUrl = e.target.result;
    currentImageData = dataUrl.split(',')[1];
    $('previewImg').src = dataUrl;
    $('preview').classList.remove('hidden');
    $('analyzeBtn').classList.remove('hidden');
    $('errorBox').innerHTML = '';
  };
  reader.readAsDataURL(file);
}

$('analyzeBtn').addEventListener('click', analyzeBook);
$('resetBtn').addEventListener('click', resetAll);

async function analyzeBook() {
  const apiKey = $('apiKey').value.trim();
  if (!apiKey) {
    showError('API Key를 먼저 입력해주세요.');
    return;
  }
  if (!currentImageData) {
    showError('이미지를 먼저 업로드해주세요.');
    return;
  }

  $('analyzeBtn').classList.add('hidden');
  $('loading').classList.remove('hidden');
  $('errorBox').innerHTML = '';
  $('resultBox').innerHTML = '';

  try {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${encodeURIComponent(apiKey)}`;

    const requestBody = {
      systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents: [{
        role: 'user',
        parts: [
          { inlineData: { mimeType: currentImageType, data: currentImageData } },
          { text: USER_PROMPT }
        ]
      }],
      generationConfig: {
        temperature: 0.7,
        maxOutputTokens: 8192,
        responseMimeType: 'application/json',
        thinkingConfig: { thinkingBudget: 0 }  // thinking 토큰 비활성화 (속도↑, 출력 공간 확보)
      }
    };

    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    });

    if (!response.ok) {
      const errText = await response.text();
      let errMsg = `API 오류 (${response.status})`;
      try {
        const errJson = JSON.parse(errText);
        errMsg += `: ${errJson.error?.message || errText}`;
      } catch { errMsg += `: ${errText}`; }
      throw new Error(errMsg);
    }

    const data = await response.json();
    const responseText = data.candidates?.[0]?.content?.parts
      ?.filter(p => p.text).map(p => p.text).join('') || '';

    if (!responseText) throw new Error('빈 응답을 받았습니다.');

    const cleaned = responseText.replace(/```json\s*|```\s*/g, '').trim();
    let result;
    try {
      result = JSON.parse(cleaned);
    } catch (parseErr) {
      // JSON이 잘렸을 때 복구 시도
      result = tryRecoverTruncatedJson(cleaned);
      if (!result) {
        throw new Error(`응답이 너무 길어 JSON이 잘렸습니다. 다시 시도해주세요. (원본 오류: ${parseErr.message})`);
      }
      // 부분 복구 성공 알림
      showError('⚠️ 응답이 일부 잘렸지만 복구해서 표시합니다. 일부 항목(특히 끝부분)이 누락될 수 있어요.');
    }

    renderResult(result);
    $('resetBtn').classList.remove('hidden');
  } catch (err) {
    showError('분석 중 오류: ' + err.message);
    $('analyzeBtn').classList.remove('hidden');
  } finally {
    $('loading').classList.add('hidden');
  }
}

// ====== JSON 복구 (응답 잘림 대응) ======

function tryRecoverTruncatedJson(text) {
  // 전략: 마지막으로 완전한 객체/배열까지만 잘라내고 닫는 괄호를 보강
  // 1) 가장 먼저 끝까지 통째 닫기 시도
  for (let trim = 0; trim < text.length; trim++) {
    let candidate = text.slice(0, text.length - trim);
    // 마지막 쉼표 제거
    candidate = candidate.replace(/,\s*$/, '');
    // 미완성 문자열 끊기 (마지막 따옴표 짝 맞추기)
    const lastQuote = candidate.lastIndexOf('"');
    const beforeQuote = candidate.slice(0, lastQuote);
    const quoteCount = (beforeQuote.match(/(?<!\\)"/g) || []).length;
    if (quoteCount % 2 === 1) {
      // 마지막 따옴표가 열린 상태 → 그 따옴표 직전까지 자르기
      candidate = candidate.slice(0, lastQuote).replace(/,\s*$/, '');
    }
    // 괄호 수 세기
    let braces = 0, brackets = 0;
    let inStr = false, escape = false;
    for (const c of candidate) {
      if (escape) { escape = false; continue; }
      if (c === '\\') { escape = true; continue; }
      if (c === '"') { inStr = !inStr; continue; }
      if (inStr) continue;
      if (c === '{') braces++;
      else if (c === '}') braces--;
      else if (c === '[') brackets++;
      else if (c === ']') brackets--;
    }
    if (braces < 0 || brackets < 0) continue;
    // 닫는 괄호 보강
    let closed = candidate.replace(/,\s*$/, '');
    closed += ']'.repeat(brackets);
    closed += '}'.repeat(braces);
    try {
      return JSON.parse(closed);
    } catch { /* 계속 시도 */ }
    if (trim > 2000) break; // 너무 많이 자르면 포기
  }
  return null;
}

// ====== 결과 렌더링 ======

const RESOURCE_META = {
  academic: { icon: '📄', label: '논문·학술' },
  video: { icon: '🎥', label: '영상·강연' },
  news: { icon: '📰', label: '언론·기사' },
  blog: { icon: '✍️', label: '블로그·비평' },
  social: { icon: '💬', label: 'SNS·토론' },
  review: { icon: '📖', label: '서평지' }
};

function buildSearchUrl(type, query) {
  const q = encodeURIComponent(query);
  switch (type) {
    case 'academic': return `https://scholar.google.com/scholar?q=${q}`;
    case 'video':    return `https://www.youtube.com/results?search_query=${q}`;
    case 'news':     return `https://www.google.com/search?q=${q}&tbm=nws`;
    case 'social':   return `https://twitter.com/search?q=${q}`;
    case 'review':
    case 'blog':
    default:         return `https://www.google.com/search?q=${q}`;
  }
}

function renderResources(resources) {
  if (!resources || resources.length === 0) return '';

  const cards = resources.map(r => {
    const meta = RESOURCE_META[r.type] || { icon: '🔗', label: '자료' };
    const hasUrl = r.url && r.url !== 'null' && /^https?:\/\//.test(r.url);

    let linkHtml = '';
    if (hasUrl) {
      linkHtml = `<a class="resource-link" href="${escapeAttr(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.url)} ↗</a>`;
    } else if (r.search_query) {
      const searchUrl = buildSearchUrl(r.type, r.search_query);
      linkHtml = `<div class="resource-search">🔍 <a href="${escapeAttr(searchUrl)}" target="_blank" rel="noopener">${escapeHtml(r.search_query)}</a></div>`;
    }

    return `
      <div class="resource-card">
        <div class="resource-icon">${meta.icon}</div>
        <div class="resource-body">
          <div class="resource-type">${meta.label}</div>
          <div class="resource-title">${escapeHtml(r.title || '-')}</div>
          ${r.description ? `<div class="resource-desc">${escapeHtml(r.description)}</div>` : ''}
          ${linkHtml}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="resources">${cards}</div>
    <div class="disclaimer">
      ⚠️ AI가 생성한 자료 추천입니다. 직접 링크는 확인된 자료에 한해 제공되며, 그 외에는 검색 쿼리로 제공됩니다. 실제 자료의 존재·품질은 직접 확인해주세요.
    </div>`;
}

function renderResult(r) {
  const box = $('resultBox');

  if (r.identified === false) {
    box.innerHTML = `
      <div class="result">
        <div class="result-section">
          <h2>식별 결과</h2>
          <div class="book-title">책을 정확히 식별하기 어려웠습니다</div>
          <p class="info-text" style="margin-top:12px;"><strong>이유:</strong> ${escapeHtml(r.reason || '-')}</p>
          <p class="info-text" style="margin-top:8px;"><strong>사진에서 본 단서:</strong> ${escapeHtml(r.what_i_see || '-')}</p>
        </div>
      </div>`;
    return;
  }

  const confidenceLabel = { high: '높음', medium: '보통', low: '낮음' }[r.confidence] || r.confidence;
  const contextLabel = r.context_section_label || '맥락 분석';

  const recHtml = (r.recommendations || []).map(rec => {
    const typeLabel = { similar: '유사 (Similar)', contrast: '대조 (Contrast)', deeper: '심화 (Deeper)' }[rec.type] || rec.type;
    return `
      <div class="rec-card ${rec.type}">
        <div class="rec-type">${typeLabel}</div>
        <div class="rec-title">${escapeHtml(rec.title)} <span style="color:#a0a0c0;font-weight:400;">— ${escapeHtml(rec.author)}</span></div>
        <div class="rec-reason">${escapeHtml(rec.reason)}</div>
      </div>`;
  }).join('');

  box.innerHTML = `
    <div class="result">
      <div class="result-section">
        <h2>식별된 책 (신뢰도: ${confidenceLabel})</h2>
        <div class="book-title">${escapeHtml(r.title)}</div>
        <div class="book-author">${escapeHtml(r.author)}</div>
        <div class="book-meta">${escapeHtml(r.publisher_year)} · ${escapeHtml(r.genre)}</div>
      </div>

      <div class="result-section">
        <h2>핵심 소개</h2>
        <p class="info-text">${escapeHtml(r.summary)}</p>
      </div>

      <div class="result-section">
        <h2>${escapeHtml(contextLabel)}</h2>
        <p class="info-text">${escapeHtml(r.context_analysis)}</p>
      </div>

      <div class="result-section">
        <h2>비평적 시각</h2>
        <p class="info-text">${escapeHtml(r.critical_view)}</p>
        ${r.resources && r.resources.length > 0 ? `
          <h2 style="margin-top:20px;">📚 참조 자료</h2>
          ${renderResources(r.resources)}
        ` : ''}
      </div>

      <div class="result-section">
        <h2>함께 읽으면 좋은 책</h2>
        <div class="recommendations">${recHtml}</div>
      </div>

      <div class="result-section">
        <h2>읽기 팁</h2>
        <p class="info-text">${escapeHtml(r.reading_tip)}</p>
      </div>
    </div>`;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}
function escapeAttr(s) { return escapeHtml(s); }

function showError(msg) {
  $('errorBox').innerHTML = `<div class="error">⚠️ ${escapeHtml(msg)}</div>`;
}

function resetAll() {
  currentImageData = null;
  currentImageType = null;
  fileInput.value = '';
  $('preview').classList.add('hidden');
  $('analyzeBtn').classList.add('hidden');
  $('resultBox').innerHTML = '';
  $('errorBox').innerHTML = '';
  $('resetBtn').classList.add('hidden');
}
</script>
